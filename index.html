<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<title>ComTime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="light"]{
  --bg:#e8e6e1;--text:#1a1a1a;--muted:#9e9e98;
  --dg-bg:#1a1a1a;--dg-fg:#e8e6e1;
  --btn-bg:rgba(0,0,0,.06);--btn-h:rgba(0,0,0,.10);
  --accent:#1a1a1a;--accent-fg:#e8e6e1;
  --red:#e74c3c;--green:#27ae60;
  --nav-a:rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#141414;--text:#e0dfdb;--muted:#6b6b66;
  --dg-bg:#e0dfdb;--dg-fg:#141414;
  --btn-bg:rgba(255,255,255,.07);--btn-h:rgba(255,255,255,.12);
  --accent:#e0dfdb;--accent-fg:#141414;
  --red:#e74c3c;--green:#2ecc71;
  --nav-a:rgba(255,255,255,.08);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;user-select:none;
  transition:background .4s,color .4s;
}

/* TITLEBAR */
.tb{-webkit-app-region:drag;position:fixed;top:0;left:0;right:0;height:36px;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.tb-logo{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);opacity:.6}
.tb-logo svg{width:15px;height:15px}
.tb-r{-webkit-app-region:no-drag;display:flex;gap:5px;align-items:center}
.wd{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;opacity:.3;transition:opacity .15s}
.wd:hover{opacity:.8}
.wd.mi{background:#f5c542}.wd.mx{background:#34c759}.wd.cl{background:#ff3b30}

/* NAV */
.nav{-webkit-app-region:no-drag;position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:201;display:flex;gap:2px;padding:6px 4px}
.nt{background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:5px 14px;border-radius:6px;transition:all .2s cubic-bezier(.16,1,.3,1)}
.nt:hover{background:var(--btn-bg);color:var(--text)}
.nt.on{background:var(--nav-a);color:var(--text)}

/* THEME BTN */
.thm{-webkit-app-region:no-drag;position:fixed;top:7px;right:76px;z-index:202;background:var(--btn-bg);border:none;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;color:var(--muted)}
.thm:hover{background:var(--btn-h);color:var(--text)}
.thm svg{width:13px;height:13px}

/* SLIDE VIEWPORT */
.vp{width:100%;height:100vh;overflow:hidden;position:relative}
.track{display:flex;width:300%;height:100%;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.sl{width:calc(100vw);height:100%;flex-shrink:0;display:flex;flex-direction:column;padding:40px 24px 12px;justify-content:center;align-items:center}

/* DIGIT BOX */
.db{background:var(--dg-bg);border-radius:var(--dr,12px);overflow:hidden;position:relative;flex-shrink:0;transition:background .4s}
.ds{position:absolute;left:0;top:0;width:100%;transition:transform .55s cubic-bezier(.16,1,.3,1);will-change:transform}
.dc{width:100%;display:flex;align-items:center;justify-content:center;color:var(--dg-fg);font-weight:900;font-variant-numeric:tabular-nums;line-height:1;transition:color .4s}

/* COLON */
.col{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.cd{background:var(--muted);border-radius:50%;opacity:.4;transition:background .4s}
@keyframes cp{0%,100%{opacity:.4}50%{opacity:.1}}
.cd-pulse{animation:cp 2s ease-in-out infinite}

/* CLOCK LABELS */
.lb{font-size:11px;font-weight:700;color:var(--muted);text-transform:lowercase;letter-spacing:.5px;transition:color .4s}

/* CLOCK LAYOUT */
.ck-wrap{display:flex;flex-direction:column;width:100%}
.ck-labels{display:flex;align-items:baseline;margin-bottom:4px}
.ck-digits{display:flex;align-items:flex-end;width:100%}
.dp{display:flex;flex-shrink:0}
.sp{display:flex;flex-shrink:0;align-self:flex-end}
.tz-row{display:flex;align-items:center;justify-content:center;margin-top:12px;gap:12px;flex-shrink:0}
.dt{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.8px;transition:color .4s}
.tz{font-size:10px;font-weight:800;color:var(--muted);background:var(--btn-bg);padding:3px 10px;border-radius:20px;letter-spacing:1.5px;transition:all .4s}

/* STOPWATCH & TIMER — LARGE DIGITS */
.mode-wrap{display:flex;flex-direction:column;align-items:center;width:100%;gap:16px}
.mode-digits{display:flex;align-items:flex-end;justify-content:center}
.mode-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;text-align:center;transition:color .4s}

/* CONTROLS */
.ctrls{display:flex;gap:10px;align-items:center;margin-top:4px}
.cb{font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.8px;border:none;cursor:pointer;padding:8px 24px;border-radius:50px;transition:all .2s cubic-bezier(.16,1,.3,1)}
.cb-p{background:var(--accent);color:var(--accent-fg)}
.cb-p:hover{opacity:.85;transform:scale(1.03)}
.cb-s{background:var(--btn-bg);color:var(--text)}
.cb-s:hover{background:var(--btn-h)}
.cb-d{background:var(--red);color:#fff}
.cb-d:hover{opacity:.85}
.cb-g{background:var(--green);color:#fff}
.cb-g:hover{opacity:.85}

/* LAPS */
.laps{width:100%;max-width:360px;max-height:80px;overflow-y:auto;font-size:11px;color:var(--muted);margin-top:4px}
.lap{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(128,128,128,.15)}
.lap span{font-weight:600;font-variant-numeric:tabular-nums}

/* TIMER INPUT MODE */
.ti-wrap{display:flex;gap:8px;align-items:center}
.ti-grp{display:flex;flex-direction:column;align-items:center;gap:3px}
.ti-inp{width:70px;text-align:center;font-family:inherit;font-size:clamp(24px,5vw,50px);font-weight:900;background:var(--btn-bg);border:2px solid rgba(128,128,128,.15);border-radius:10px;padding:6px 2px;color:var(--text);outline:none;transition:border-color .2s;font-variant-numeric:tabular-nums;-moz-appearance:textfield}
.ti-inp::-webkit-outer-spin-button,.ti-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.ti-inp:focus{border-color:var(--accent)}
.ti-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ti-sep{font-size:clamp(24px,5vw,50px);font-weight:900;color:var(--muted);opacity:.35}

/* TIMER DONE */
.tm-done .dc{animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px;opacity:.3}
</style>
</head>
<body>

<div class="tb">
  <div class="tb-logo">
    <svg viewBox="0 0 32 32" fill="none"><rect x="2" y="2" width="28" height="28" rx="5" fill="currentColor"/><path d="M10 10L22 22M22 10L16 16" stroke="var(--bg)" stroke-width="3" stroke-linecap="round"/></svg>
    COMTIME
  </div>
  <div class="tb-r">
    <button class="wd mi" onclick="electronAPI?.minimize()"></button>
    <button class="wd mx" onclick="electronAPI?.maximize()"></button>
    <button class="wd cl" onclick="electronAPI?.close()"></button>
  </div>
</div>

<div class="nav">
  <button class="nt on" data-m="0" onclick="go(0)">Saat</button>
  <button class="nt" data-m="1" onclick="go(1)">Kronometre</button>
  <button class="nt" data-m="2" onclick="go(2)">Sayaç</button>
</div>

<button class="thm" onclick="toggleTheme()" title="Tema">
  <svg id="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="vp">
<div class="track" id="track">

<!-- ======= CLOCK ======= -->
<div class="sl" id="sl0">
  <div class="ck-wrap">
    <div class="ck-labels" id="ckL"></div>
    <div class="ck-digits" id="ckD"></div>
  </div>
  <div class="tz-row">
    <span class="dt" id="dateEl"></span>
    <span class="tz">TR · UTC+3</span>
  </div>
</div>

<!-- ======= STOPWATCH ======= -->
<div class="sl" id="sl1">
  <div class="mode-wrap">
    <div class="mode-digits" id="swD"></div>
    <div class="ctrls" id="swC">
      <button class="cb cb-p" id="swBtn" onclick="swToggle()">Başlat</button>
      <button class="cb cb-s" id="swLap" onclick="swLapF()" style="display:none">Tur</button>
      <button class="cb cb-s" id="swRst" onclick="swReset()" style="display:none">Sıfırla</button>
    </div>
    <div class="laps" id="swLaps"></div>
  </div>
</div>

<!-- ======= TIMER ======= -->
<div class="sl" id="sl2">
  <div class="mode-wrap">
    <div id="tmSetup">
      <div class="ti-wrap">
        <div class="ti-grp"><input class="ti-inp" type="number" id="tmH" value="00" min="0" max="99"><span class="ti-lbl">saat</span></div>
        <span class="ti-sep">:</span>
        <div class="ti-grp"><input class="ti-inp" type="number" id="tmM" value="05" min="0" max="59"><span class="ti-lbl">dk</span></div>
        <span class="ti-sep">:</span>
        <div class="ti-grp"><input class="ti-inp" type="number" id="tmS" value="00" min="0" max="59"><span class="ti-lbl">sn</span></div>
      </div>
    </div>
    <div class="mode-digits" id="tmD" style="display:none"></div>
    <div class="ctrls" id="tmC">
      <button class="cb cb-g" id="tmBtn" onclick="tmToggle()">Başlat</button>
      <button class="cb cb-s" id="tmRst" onclick="tmReset()" style="display:none">Sıfırla</button>
    </div>
  </div>
</div>

</div>
</div>

<script>
// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
let curSlide = 0;
function go(i) {
  curSlide = i;
  document.getElementById('track').style.transform = 'translateX(-' + (i * 100 / 3) + '%)';
  document.querySelectorAll('.nt').forEach(t => t.classList.toggle('on', +t.dataset.m === i));
  requestAnimationFrame(() => { resizeClock(); resizeSW(); resizeTM(); });
}

// ══════════════════════════════════════════
// THEME
// ══════════════════════════════════════════
let dark = false;
function toggleTheme() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('ti').innerHTML = dark
    ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// ══════════════════════════════════════════
// DIGIT BUILDER — reusable for all modes
// ══════════════════════════════════════════
function mkDigit(parent, id) {
  const box = document.createElement('div');
  box.className = 'db';
  box.id = id;
  const strip = document.createElement('div');
  strip.className = 'ds';
  for (let i = 0; i <= 9; i++) {
    const c = document.createElement('div');
    c.className = 'dc';
    c.textContent = i;
    strip.appendChild(c);
  }
  box.appendChild(strip);
  box._strip = strip;
  box._v = -1;
  parent.appendChild(box);
  return box;
}

function mkColon(parent, cls) {
  const c = document.createElement('div');
  c.className = 'col ' + (cls || '');
  c.innerHTML = '<div class="cd cd-pulse"></div><div class="cd cd-pulse"></div>';
  parent.appendChild(c);
  return c;
}

function mkPair(parent, id1, id2) {
  const p = document.createElement('div');
  p.className = 'dp';
  const a = mkDigit(p, id1);
  const b = mkDigit(p, id2);
  parent.appendChild(p);
  return [a, b];
}

function setD(box, v) {
  v = +v;
  if (box._v === v) return;
  box._v = v;
  box._strip.style.transform = 'translateY(' + (-v * box.offsetHeight) + 'px)';
}

function sizeDigits(boxes, w, h, r, fs) {
  const s = document.documentElement.style;
  boxes.forEach(b => {
    b.style.width = w + 'px';
    b.style.height = h + 'px';
    b.style.borderRadius = r + 'px';
    b.querySelectorAll('.dc').forEach(c => { c.style.fontSize = fs + 'px'; c.style.height = h + 'px'; });
    if (b._v >= 0) b._strip.style.transform = 'translateY(' + (-b._v * h) + 'px)';
  });
}

function sizeColons(colons, w, h, dotSz, gap) {
  colons.forEach(c => {
    c.style.width = w + 'px';
    c.style.height = h + 'px';
    const dots = c.querySelectorAll('.cd');
    dots.forEach(d => { d.style.width = dotSz + 'px'; d.style.height = dotSz + 'px'; });
    if (dots[1]) dots[1].style.marginTop = gap + 'px';
  });
}

// ══════════════════════════════════════════
// CLOCK MODE
// ══════════════════════════════════════════
const ckContainer = document.getElementById('ckD');
const ckLabels = document.getElementById('ckL');

// Build labels
['saat', 'dakika', 'saniye'].forEach(t => {
  const s = document.createElement('span');
  s.className = 'lb';
  s.id = 'lb-' + t[0];
  s.textContent = t;
  ckLabels.appendChild(s);
});

// Build digits
const [ch1, ch2] = mkPair(ckContainer, 'ch1', 'ch2');
const ckCol1 = mkColon(ckContainer, 'ck-col');
const [cm1, cm2] = mkPair(ckContainer, 'cm1', 'cm2');
const ckCol2 = mkColon(ckContainer, 'ck-scol');
const secPair = document.createElement('div');
secPair.className = 'sp';
const cs1 = mkDigit(secPair, 'cs1');
const cs2 = mkDigit(secPair, 'cs2');
ckContainer.appendChild(secPair);

const ckBoxes = [ch1, ch2, cm1, cm2];
const ckSec = [cs1, cs2];
const ckCols = [ckCol1];
const ckSCol = [ckCol2];

function resizeClock() {
  const sl = document.getElementById('sl0');
  const aW = sl.offsetWidth - 48;
  const aH = sl.offsetHeight - 100;
  const ar = .68, sc = .50, cr = .20, gr = .03;
  const tot = 4 + 2*cr + 2*sc + cr*.6 + 6*gr;
  let dW = aW / tot, dH = dW / ar;
  if (dH > aH) { dH = aH; dW = dH * ar; }
  dW = Math.max(30, Math.min(dW, 400));
  dH = dW / ar;
  const cW = dW * cr, g = dW * gr, r = dW * .07, fs = dH * .8;
  const sW = dW * sc, sH = dH * sc, sr = r * sc, sfs = fs * sc;

  sizeDigits(ckBoxes, dW, dH, r, fs);
  sizeDigits(ckSec, sW, sH, sr, sfs);
  ckBoxes.forEach((b, i) => { if (i % 2 === 1) b.style.marginLeft = '0'; b.parentElement.style.gap = g + 'px'; });
  secPair.style.gap = (g * .6) + 'px';
  sizeColons(ckCols, cW, dH, dH * .055, dH * .15);
  sizeColons(ckSCol, cW * .6, sH, sH * .055, sH * .15);

  // Labels
  const lh = document.getElementById('lb-s');
  const lm = document.getElementById('lb-d');
  const ls = document.getElementById('lb-sa') || document.getElementById('lb-s');
  document.getElementById('lb-s').style.width = (2*dW + g) + 'px';
  document.getElementById('lb-d').style.marginLeft = cW + 'px';
  document.getElementById('lb-d').style.width = (2*dW + g) + 'px';
  // saniye label - fix id
}

// Fix label IDs
document.getElementById('lb-s').id = 'lb-saat';
document.getElementById('lb-d').id = 'lb-dk';
document.getElementById('lb-sa') || (function(){
  // The third label
  const labels = ckLabels.querySelectorAll('.lb');
  labels[0].id = 'lb-saat';
  labels[1].id = 'lb-dk';
  labels[2].id = 'lb-sn';
})();

function resizeClockFixed() {
  const sl = document.getElementById('sl0');
  const aW = sl.offsetWidth - 48;
  const aH = sl.offsetHeight - 100;
  const ar = .68, sc = .50, cr = .20, gr = .03;
  const tot = 4 + 2*cr + 2*sc + cr*.6 + 6*gr;
  let dW = aW / tot, dH = dW / ar;
  if (dH > aH) { dH = aH; dW = dH * ar; }
  dW = Math.max(30, Math.min(dW, 400));
  dH = dW / ar;
  const cW = dW * cr, g = dW * gr, r = dW * .07, fs = dH * .8;
  const sW = dW * sc, sH = dH * sc, sr = r * sc, sfs = fs * sc;

  sizeDigits(ckBoxes, dW, dH, r, fs);
  sizeDigits(ckSec, sW, sH, sr, sfs);
  [ch1.parentElement, cm1.parentElement].forEach(p => p.style.gap = g + 'px');
  secPair.style.gap = (g * .6) + 'px';
  sizeColons(ckCols, cW, dH, dH * .055, dH * .15);
  sizeColons(ckSCol, cW * .6, sH, sH * .055, sH * .15);

  const labels = ckLabels.querySelectorAll('.lb');
  labels[0].style.width = (2*dW + g) + 'px';
  labels[1].style.marginLeft = cW + 'px';
  labels[1].style.width = (2*dW + g) + 'px';
  labels[2].style.marginLeft = (cW * .6) + 'px';
}

const trD = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const trM = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function tickClock() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const tr = new Date(utc + 3 * 3600000);
  const h = String(tr.getHours()).padStart(2, '0');
  const m = String(tr.getMinutes()).padStart(2, '0');
  const s = String(tr.getSeconds()).padStart(2, '0');
  setD(ch1, h[0]); setD(ch2, h[1]);
  setD(cm1, m[0]); setD(cm2, m[1]);
  setD(cs1, s[0]); setD(cs2, s[1]);
  document.getElementById('dateEl').textContent = trD[tr.getDay()] + ', ' + tr.getDate() + ' ' + trM[tr.getMonth()] + ' ' + tr.getFullYear();
}

// ══════════════════════════════════════════
// STOPWATCH — BIG DIGITS
// ══════════════════════════════════════════
const swContainer = document.getElementById('swD');
const [swM1, swM2] = mkPair(swContainer, 'swm1', 'swm2');
const swCol1 = mkColon(swContainer, 'sw-col');
const [swS1, swS2] = mkPair(swContainer, 'sws1', 'sws2');
const swCol2 = mkColon(swContainer, 'sw-scol');
const [swT1, swT2] = mkPair(swContainer, 'swt1', 'swt2');

const swAll = [swM1, swM2, swS1, swS2, swT1, swT2];
const swColAll = [swCol1, swCol2];

function resizeSW() {
  const sl = document.getElementById('sl1');
  const aW = sl.offsetWidth - 48;
  const aH = sl.offsetHeight - 120;
  const ar = .68, cr = .18, gr = .03;
  const tot = 6 + 2*cr + 5*gr;
  let dW = aW / tot, dH = dW / ar;
  if (dH > aH) { dH = aH; dW = dH * ar; }
  dW = Math.max(25, Math.min(dW, 260));
  dH = dW / ar;
  const cW = dW * cr, g = dW * gr, r = dW * .07, fs = dH * .78;

  sizeDigits(swAll, dW, dH, r, fs);
  [swM1.parentElement, swS1.parentElement, swT1.parentElement].forEach(p => p.style.gap = g + 'px');
  sizeColons(swColAll, cW, dH, dH * .055, dH * .15);
}

let swOn = false, swT0 = 0, swEl = 0, swIv = null, swLapArr = [];

function swParse(ms) {
  const cs = Math.floor(ms / 10) % 100;
  const s = Math.floor(ms / 1000) % 60;
  const m = Math.floor(ms / 60000) % 60;
  return [
    String(m).padStart(2,'0'),
    String(s).padStart(2,'0'),
    String(cs).padStart(2,'0')
  ];
}

function swRender(ms) {
  const [m, s, cs] = swParse(ms);
  setD(swM1, m[0]); setD(swM2, m[1]);
  setD(swS1, s[0]); setD(swS2, s[1]);
  setD(swT1, cs[0]); setD(swT2, cs[1]);
}

function swTick() {
  swRender(swEl + (performance.now() - swT0));
}

function swToggle() {
  if (!swOn) {
    swOn = true; swT0 = performance.now();
    swIv = setInterval(swTick, 30);
    document.getElementById('swBtn').textContent = 'Durdur';
    document.getElementById('swBtn').className = 'cb cb-d';
    document.getElementById('swLap').style.display = '';
    document.getElementById('swRst').style.display = 'none';
  } else {
    swOn = false; swEl += performance.now() - swT0;
    clearInterval(swIv);
    document.getElementById('swBtn').textContent = 'Devam';
    document.getElementById('swBtn').className = 'cb cb-g';
    document.getElementById('swLap').style.display = 'none';
    document.getElementById('swRst').style.display = '';
  }
}

function swLapF() {
  const t = swEl + (performance.now() - swT0);
  swLapArr.push(t);
  const [m, s, cs] = swParse(t);
  const d = document.createElement('div');
  d.className = 'lap';
  d.innerHTML = '<span>Tur ' + swLapArr.length + '</span><span>' + m + ':' + s + '.' + cs + '</span>';
  document.getElementById('swLaps').prepend(d);
}

function swReset() {
  swEl = 0; swLapArr = [];
  swRender(0);
  document.getElementById('swBtn').textContent = 'Başlat';
  document.getElementById('swBtn').className = 'cb cb-p';
  document.getElementById('swLap').style.display = 'none';
  document.getElementById('swRst').style.display = 'none';
  document.getElementById('swLaps').innerHTML = '';
}

// ══════════════════════════════════════════
// TIMER — BIG DIGITS
// ══════════════════════════════════════════
const tmContainer = document.getElementById('tmD');
const [tmM1, tmM2] = mkPair(tmContainer, 'tmm1', 'tmm2');
const tmCol1 = mkColon(tmContainer, 'tm-col');
const [tmS1, tmS2] = mkPair(tmContainer, 'tms1', 'tms2');

const tmAll = [tmM1, tmM2, tmS1, tmS2];
const tmColAll = [tmCol1];

function resizeTM() {
  const sl = document.getElementById('sl2');
  const aW = sl.offsetWidth - 48;
  const aH = sl.offsetHeight - 140;
  const ar = .68, cr = .2, gr = .03;
  const tot = 4 + cr + 4*gr;
  let dW = aW / tot, dH = dW / ar;
  if (dH > aH) { dH = aH; dW = dH * ar; }
  dW = Math.max(30, Math.min(dW, 300));
  dH = dW / ar;
  const cW = dW * cr, g = dW * gr, r = dW * .07, fs = dH * .78;

  sizeDigits(tmAll, dW, dH, r, fs);
  [tmM1.parentElement, tmS1.parentElement].forEach(p => p.style.gap = g + 'px');
  sizeColons(tmColAll, cW, dH, dH * .06, dH * .15);
}

let tmOn = false, tmRem = 0, tmT0 = 0, tmIv = null, tmDone = false;

function tmRender(ms) {
  if (ms < 0) ms = 0;
  const s = Math.ceil(ms / 1000) % 60;
  const m = Math.floor(ms / 60000);
  const mm = String(m).padStart(2, '0');
  const ss = String(s).padStart(2, '0');
  setD(tmM1, mm[0]); setD(tmM2, mm[1]);
  setD(tmS1, ss[0]); setD(tmS2, ss[1]);
}

function tmTick() {
  const left = tmRem - (performance.now() - tmT0);
  tmRender(left);
  if (left <= 0) {
    clearInterval(tmIv); tmOn = false; tmDone = true;
    tmContainer.classList.add('tm-done');
    document.getElementById('tmBtn').textContent = 'Tamam';
    document.getElementById('tmBtn').className = 'cb cb-p';
    try {
      const ac = new AudioContext();
      function bip(f, st, d) { const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=f;o.type='sine';g.gain.value=.3;o.start(ac.currentTime+st);o.stop(ac.currentTime+st+d); }
      bip(880,0,.15);bip(880,.25,.15);bip(1100,.5,.3);
    } catch(e) {}
  }
}

function tmToggle() {
  if (tmDone) { tmReset(); return; }
  if (!tmOn) {
    if (tmRem === 0) {
      const h = parseInt(document.getElementById('tmH').value) || 0;
      const m = parseInt(document.getElementById('tmM').value) || 0;
      const s = parseInt(document.getElementById('tmS').value) || 0;
      tmRem = (h * 3600 + m * 60 + s) * 1000;
      if (tmRem <= 0) return;
    }
    tmOn = true; tmT0 = performance.now();
    document.getElementById('tmSetup').style.display = 'none';
    tmContainer.style.display = '';
    tmContainer.classList.remove('tm-done');
    tmRender(tmRem);
    requestAnimationFrame(resizeTM);
    tmIv = setInterval(tmTick, 50);
    document.getElementById('tmBtn').textContent = 'Durdur';
    document.getElementById('tmBtn').className = 'cb cb-d';
    document.getElementById('tmRst').style.display = '';
  } else {
    tmOn = false; tmRem -= (performance.now() - tmT0);
    clearInterval(tmIv);
    document.getElementById('tmBtn').textContent = 'Devam';
    document.getElementById('tmBtn').className = 'cb cb-g';
  }
}

function tmReset() {
  clearInterval(tmIv); tmOn = false; tmRem = 0; tmDone = false;
  document.getElementById('tmSetup').style.display = '';
  tmContainer.style.display = 'none';
  tmContainer.classList.remove('tm-done');
  document.getElementById('tmBtn').textContent = 'Başlat';
  document.getElementById('tmBtn').className = 'cb cb-g';
  document.getElementById('tmRst').style.display = 'none';
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
resizeClockFixed(); resizeSW(); resizeTM();
swRender(0); tmRender(300000);
tickClock();
setInterval(tickClock, 250);
window.addEventListener('resize', () => { resizeClockFixed(); resizeSW(); resizeTM(); });

document.querySelectorAll('.ti-inp').forEach(inp => {
  inp.addEventListener('focus', () => inp.select());
  inp.addEventListener('blur', () => {
    let v = parseInt(inp.value) || 0;
    if (inp.id !== 'tmH') v = Math.min(59, Math.max(0, v));
    inp.value = String(v).padStart(2, '0');
  });
});
</script>
